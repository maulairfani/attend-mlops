services:

  # ─── MinIO ────────────────────────────────────────────────────────────────
  # S3-compatible object storage.
  # Bucket "mlflow-artifacts" → MLflow artifact store
  # Bucket "dvc-store"        → DVC remote storage
  minio:
    image: quay.io/minio/minio:latest
    container_name: attend-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (browser UI)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - default
      - attend_network
      - proxy_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the two required buckets on first startup.
  minio-init:
    image: quay.io/minio/mc:latest
    container_name: attend-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - default
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/mlflow-artifacts;
        mc mb --ignore-existing local/dvc-store;
        mc mb --ignore-existing local/zenml-artifacts;
        echo 'Buckets ready.';
      "

  # ─── MLflow ───────────────────────────────────────────────────────────────
  # Tracking server + Model Registry.
  # Artifact store → s3://mlflow-artifacts (backed by MinIO above)
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: attend-mlflow
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_AUTH_CONFIG_PATH: /mlflow/auth.ini
      MLFLOW_ADMIN_USERNAME: ${MLFLOW_ADMIN_USERNAME:-admin}
      MLFLOW_ADMIN_PASSWORD: ${MLFLOW_ADMIN_PASSWORD:-admin}
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY:-changeme}
      MLFLOW_ALLOWED_HOSTS: ${MLFLOW_ALLOWED_HOSTS:-mlflow.yourdomain.com}
    entrypoint: []
    command:
      - sh
      - -c
      - >-
        pip install --quiet flask-wtf &&
        echo '[mlflow]' > /mlflow/auth.ini &&
        echo 'default_permission = READ' >> /mlflow/auth.ini &&
        echo 'database_uri = sqlite:////mlflow/auth.db' >> /mlflow/auth.ini &&
        echo "admin_username = $$MLFLOW_ADMIN_USERNAME" >> /mlflow/auth.ini &&
        echo "admin_password = $$MLFLOW_ADMIN_PASSWORD" >> /mlflow/auth.ini &&
        mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root s3://mlflow-artifacts/
        --serve-artifacts
        --app-name basic-auth
        --allowed-hosts $$MLFLOW_ALLOWED_HOSTS
    volumes:
      - mlflow_data:/mlflow
    networks:
      - default
      - attend_network
      - proxy_network

  # ─── ZenML ────────────────────────────────────────────────────────────────
  # Pipeline orchestration server.
  # MySQL backend keeps pipeline metadata durable across restarts.
  zenml-db:
    image: mysql:lts
    container_name: attend-zenml-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${ZENML_MYSQL_ROOT_PASSWORD:-zenml}
      MYSQL_DATABASE: zenml
      MYSQL_USER: zenml
      MYSQL_PASSWORD: ${ZENML_MYSQL_PASSWORD:-zenml}
    volumes:
      - zenml_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  zenml:
    image: zenmldocker/zenml-server:latest
    container_name: attend-zenml
    restart: unless-stopped
    depends_on:
      zenml-db:
        condition: service_healthy
    ports:
      - "8237:8080"
    environment:
      ZENML_STORE_URL: mysql://zenml:${ZENML_MYSQL_PASSWORD:-zenml}@zenml-db/zenml
      ZENML_DEFAULT_USER_NAME: ${ZENML_USER:-admin}
      ZENML_DEFAULT_USER_PASSWORD: ${ZENML_PASSWORD:-admin}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    networks:
      - default
      - attend_network
      - proxy_network

networks:
  attend_network:
    external: true
  proxy_network:
    external: true

volumes:
  minio_data:
  mlflow_data:
  zenml_db_data:
