services:
  ai-backend:
    build:
      context: .
      dockerfile: serving/Dockerfile
    image: attend-ai-backend:latest
    restart: unless-stopped
    env_file:
      - .env.ai
    command: >
      sh -c "uvicorn serving.main:app --host ${AI_HOST:-0.0.0.0} --port ${AI_PORT:-5679}"
    environment:
      AI_HOST: ${AI_HOST:-0.0.0.0}
      AI_PORT: ${AI_PORT:-5679}
      AI_JPEG_QUALITY: ${AI_JPEG_QUALITY:-75}
      AI_INFERENCE_EVERY_N_FRAMES: ${AI_INFERENCE_EVERY_N_FRAMES:-3}
      AI_FACE_CAPTURE_INTERVAL_SECONDS: ${AI_FACE_CAPTURE_INTERVAL_SECONDS:-5}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${AI_PORT:-5679}:${AI_PORT:-5679}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; p=os.getenv('AI_PORT','5679'); urllib.request.urlopen(f'http://127.0.0.1:{p}/healthz', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      attend_network:
        aliases:
          - ai-backend

networks:
  attend_network:
    external: true
